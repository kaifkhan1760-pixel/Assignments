<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Navbar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">


</head>
<body>
    <!-- HERO SECTION -->

<section class="hero">

    <!-- Background Video -->

    <video autoplay muted loop playsinline class="hero-video">

        <source src="anime-bg.mp4" type="video/mp4">

    </video>

    <!-- Dark Overlay -->

    <div class="overlay"></div>

    <!-- Hero Content -->

    <div class="hero-content container">

        <div class="row align-items-center min-vh-100">

            <!-- LEFT CONTENT -->

            <div class="col-lg-7">

                <span class="hero-badge">
                    🔥 #1 Anime Streaming Platform
                </span>

                <h1>
                    Watch Anime <br>
                    Anytime Anywhere
                </h1>

                <p>
                    Stream the latest anime series, blockbuster movies,
                    legendary battles and fan-favorite characters
                    in Ultra HD quality only on AnimeWorld.
                </p>

                <!-- BUTTONS -->

                <div class="hero-buttons mt-4">

                    <button class="btn btn-danger btn-lg me-3">
                        ▶ Watch Trailer
                    </button>

                    <button class="btn btn-outline-light btn-lg">
                        Explore Anime
                    </button>

                </div>

                <!-- STATS -->

                <div class="hero-stats mt-5">

                    <div class="row">

                        <div class="col-4">
                            <h2>500+</h2>
                            <p>Anime</p>
                        </div>

                        <div class="col-4">
                            <h2>100K+</h2>
                            <p>Fans</p>
                        </div>

                        <div class="col-4">
                            <h2>4K</h2>
                            <p>Streaming</p>
                        </div>

                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE IMAGE -->

            <div class="col-lg-5 text-center">

                <img 
                    src="https://images.wallpapersden.com/image/download/gear-5-monkey-d-luffy-art-one-piece_bWppZ2WUmZqaraWkpJRoamVsrWdsbmU.jpg"
                    class="hero-character img-fluid">

            </div>

        </div>

    </div>

</section>
</body>
</html>
