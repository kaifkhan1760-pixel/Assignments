<!-- adventure.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Adventure Anime</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#111;
            color:white;
            font-family:Arial;
        }

        .anime-card{
            background:#1c1c1c;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .anime-card:hover{
            transform:translateY(-10px);
        }

        .anime-card img{
            width:100%;
            height:350px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
        }

    </style>

</head>

<body>

    <div class="container py-5">

        <h1 class="text-center text-warning mb-5">
            Adventure Anime
        </h1>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://4kwallpapers.com/images/walls/thumbs_2t/26027.jpg">

                    <div class="card-content">
                        <h4>Zoro</h4>
                        <p>One Piece Adventure</p>
                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://cdn.wallpapersafari.com/16/33/HxTG8F.jpg">

                    <div class="card-content">
                        <h4>Goku</h4>
                        <p>Dragon Ball Journey</p>
                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://i.pinimg.com/736x/0d/b0/80/0db08064258f306c6e6eff4ab81359a7.jpg">

                    <div class="card-content">
                        <h4>Levi Ackerman</h4>
                        <p>Attack On Titan</p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
