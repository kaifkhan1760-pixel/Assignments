<!-- fantasy.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fantasy Anime</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0d0d0d;
            color:white;
            font-family:Arial;
        }

        .anime-card{
            background:#1b1b1b;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .anime-card:hover{
            transform:scale(1.05);
        }

        .anime-card img{
            width:100%;
            height:350px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
        }

    </style>

</head>

<body>

    <div class="container py-5">

        <h1 class="text-center text-danger mb-5">
            Fantasy Anime
        </h1>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://wallpapers-clan.com/wp-content/uploads/2024/04/naruto-itachi-uchiha-aesthetic-anime-desktop-wallpaper-preview.jpg">

                    <div class="card-content">
                        <h4>Itachi Uchiha</h4>
                        <p>Sharingan Master</p>
                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://www.pixelstalk.net/wp-content/uploads/images6/Anime-Boy-Wallpaper-Desktop.jpg">

                    <div class="card-content">
                        <h4>Gojo Satoru</h4>
                        <p>Limitless Power</p>
                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="anime-card">

                    <img src="https://images.wallpapersden.com/image/download/demon-slayer-kimetsu-no-yaiba-4k-poster_bWVtam6UmZqaraWkpJRobWllrWdma2U.jpg">

                    <div class="card-content">
                        <h4>Tanjiro</h4>
                        <p>Demon Slayer</p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
